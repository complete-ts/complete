[install]

# https://bun.com/docs/runtime/bunfig#install-exact
# By default, bun will install the latest non-major versions, similar to how npm works.
exact = true

# https://bun.com/docs/runtime/bunfig#install-minimumreleaseage
# By default, bun will download any dependency. We want to configure a minimum age to mitigate
# supply chain attacks.
#minimumReleaseAge = 604800 # 1 week in seconds (7 * 24 * 60 * 60)
